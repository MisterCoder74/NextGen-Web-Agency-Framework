    <script>
        class TenantManager {
            constructor() {
                this.editingId = null;
                this.selectedTenant = null;
                this.tenants = [];
                this.init();
            }

            init() {
                document.getElementById('tenantForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleFormSubmit();
                });

                document.getElementById('tenant-name').addEventListener('input', (e) => {
                    const slug = this.slugify(e.target.value);
                    document.getElementById('tenant-slug').value = slug;
                });

                this.loadTenants();
            }

            slugify(str) {
                return str.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').substring(0, 60);
            }

            handleFormSubmit() {
                const emailsRaw = document.getElementById('tenant-emails').value;
                const emails = emailsRaw.split(',').map(e => e.trim()).filter(e => e);

                if (emails.length === 0) {
                    this.showMessage('At least one authorized email is required', 'error');
                    return;
                }

                const data = {
                    action: 'create',
                    name: document.getElementById('tenant-name').value.trim(),
                    authorized_emails: emails,
                    initial_user: {
                        username: document.getElementById('user-username').value.trim(),
                        password: document.getElementById('user-password').value.trim(),
                        role: document.getElementById('user-role').value
                    }
                };

                if (!data.initial_user.username || !data.initial_user.password) {
                    this.showMessage('Initial user username and password are required', 'error');
                    return;
                }

                this.createTenant(data);
            }

            createTenant(data) {
                this.showLoading(true);
                const username = localStorage.getItem('sync_username') || 'Anonymous';

                fetch('../tools/api/tenant_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...data, username })
                })
                .then(r => r.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.showMessage('Tenant created successfully! 🚀', 'success');
                        this.resetForm();
                        this.loadTenants();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(err => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error(err);
                });
            }

            loadTenants() {
                this.showLoading(true);
                const username = localStorage.getItem('sync_username') || 'Anonymous';

                fetch('../tools/api/tenant_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list', username })
                })
                .then(r => r.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.tenants = result.data.tenants || [];
                        this.displayTenants(this.tenants);
                    } else {
                        this.showMessage('Error loading tenants: ' + result.message, 'error');
                    }
                })
                .catch(err => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error(err);
                });
            }

            displayTenants(tenants) {
                const tbody = document.getElementById('tenantsTableBody');
                tbody.innerHTML = '';

                if (tenants.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: rgba(255,255,255,0.3); padding: 40px;">No tenant workspaces yet. Create one above.</td></tr>';
                    return;
                }

                tenants.forEach(t => {
                    const statusClass = 'status-' + (t.status || 'pending');
                    const statusIcon = t.status === 'active' ? '●' : t.status === 'suspended' ? '■' : '○';
                    const emails = (t.authorized_emails || []).slice(0, 3);
                    const more = (t.authorized_emails || []).length > 3 ? ` +${(t.authorized_emails || []).length - 3}` : '';

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong style="color: #5eead4;">${this.escHtml(t.name)}</strong></td>
                        <td><code style="font-size: 0.75rem; color: rgba(255,255,255,0.5);">${this.escHtml(t.slug)}</code></td>
                        <td><span class="status-badge ${statusClass}">${statusIcon} ${t.status || 'pending'}</span></td>
                        <td><span style="font-size: 0.78rem; color: rgba(255,255,255,0.5);">${emails.map(e => this.escHtml(e)).join(', ')}${more}</span></td>
                        <td><span style="font-size: 0.75rem; color: rgba(255,255,255,0.4);">${this.escHtml(t.created_at ? t.created_at.split(' ')[0] : '-')}</span></td>
                        <td><span style="font-size: 0.75rem; color: rgba(255,255,255,0.4);">${t.activated_at ? t.activated_at.split(' ')[0] : '-'}</span></td>
                        <td class="actions-cell">
                            <button class="btn btn-small btn-users" onclick="tenantManager.openUsersModal('${t.id}')">Users</button>
                            ${t.status !== 'active' ? `<button class="btn btn-small btn-activate" onclick="tenantManager.activateTenant('${t.id}')">Activate</button>` : `<button class="btn btn-small btn-suspend" onclick="tenantManager.suspendTenant('${t.id}')">Suspend</button>`}
                            <button class="btn btn-small btn-delete-tool" onclick="tenantManager.deleteTenant('${t.id}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            activateTenant(id) {
                if (!confirm('Activate this tenant workspace? Users will be able to log in.')) return;
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                fetch('../tools/api/tenant_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'activate', tenant_id: id, username })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        this.showMessage('Tenant activated successfully! ✅', 'success');
                        this.loadTenants();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(err => { this.showMessage('Connection error', 'error'); console.error(err); });
            }

            suspendTenant(id) {
                if (!confirm('Suspend this tenant? Users will not be able to log in.')) return;
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                fetch('../tools/api/tenant_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'suspend', tenant_id: id, username })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        this.showMessage('Tenant suspended. ✅', 'success');
                        this.loadTenants();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(err => { this.showMessage('Connection error', 'error'); console.error(err); });
            }

            deleteTenant(id) {
                if (!confirm('Permanently delete this tenant? This action cannot be undone.')) return;
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                fetch('../tools/api/tenant_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'suspend', tenant_id: id, username })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        this.showMessage('Tenant deleted. ✅', 'success');
                        this.loadTenants();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(err => { this.showMessage('Connection error', 'error'); console.error(err); });
            }

            openUsersModal(id) {
                this.selectedTenant = this.tenants.find(t => t.id === id);
                if (!this.selectedTenant) return;

                const modal = document.getElementById('users-modal');
                const content = document.getElementById('users-modal-content');

                content.innerHTML = `
                    <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 15px;">Managing users for <strong style="color:#5eead4;">${this.escHtml(this.selectedTenant.name)}</strong></p>
                    <div id="user-list-container" class="user-list"><p style="font-size:0.8rem;opacity:0.4;">Loading users...</p></div>
                    <hr class="divider-line">
                    <h4 style="color:rgba(255,255,255,0.7);margin-bottom:10px;font-size:0.85rem;">Add New User</h4>
                    <div class="form-grid" style="gap: 10px;">
                        <div class="form-group">
                            <label style="font-size:0.65rem;">Username</label>
                            <input type="text" id="new-user-name" placeholder="username">
                        </div>
                        <div class="form-group">
                            <label style="font-size:0.65rem;">Password</label>
                            <input type="password" id="new-user-pass" placeholder="password">
                        </div>
                        <div class="form-group">
                            <label style="font-size:0.65rem;">Role</label>
                            <select id="new-user-role" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;padding:10px 13px;font-size:0.86rem;outline:none;">
                                <option value="technician">Technician</option>
                                <option value="management">Management</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" style="margin-top:10px;width:100%;" onclick="tenantManager.addUser()">➕ Add User</button>
                `;

                modal.classList.add('open');
                this.loadTenantUsers(id);
            }

            closeUsersModal() {
                document.getElementById('users-modal').classList.remove('open');
            }

            loadTenantUsers(id) {
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                fetch('../tools/api/tenant_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'list_users', tenant_id: id, username })
                })
                .then(r => r.json())
                .then(result => {
                    const container = document.getElementById('user-list-container');
                    if (result.success && result.data.users && result.data.users.length > 0) {
                        container.innerHTML = result.data.users.map(u => `
                            <div class="user-item">
                                <span class="username">${this.escHtml(u.username)}</span>
                                <span class="role-badge ${u.role === 'management' ? 'role-mgmt' : 'role-tech'}">${u.role}</span>
                                <span style="font-size:0.7rem;color:rgba(255,255,255,0.3);">${u.created_at ? u.created_at.split(' ')[0] : ''}</span>
                                <button class="btn btn-small btn-delete-tool" onclick="tenantManager.removeUser('${this.escHtml(u.username)}')">✕</button>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = '<p style="font-size:0.8rem;opacity:0.4;padding:10px 0;">No users yet</p>';
                    }
                })
                .catch(err => { console.error(err); });
            }

            addUser() {
                if (!this.selectedTenant) return;
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                const userData = {
                    username: document.getElementById('new-user-name').value.trim(),
                    password: document.getElementById('new-user-pass').value.trim(),
                    role: document.getElementById('new-user-role').value
                };

                if (!userData.username || !userData.password) {
                    alert('Username and password are required');
                    return;
                }

                fetch('../tools/api/tenant_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'add_user',
                        tenant_id: this.selectedTenant.id,
                        username: userData.username,
                        password: userData.password,
                        role: userData.role,
                        requester: username
                    })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        document.getElementById('new-user-name').value = '';
                        document.getElementById('new-user-pass').value = '';
                        this.loadTenantUsers(this.selectedTenant.id);
                    } else {
                        alert('Error: ' + result.message);
                    }
                })
                .catch(err => { alert('Connection error'); console.error(err); });
            }

            removeUser(targetUsername) {
                if (!this.selectedTenant) return;
                if (!confirm(`Remove user "${targetUsername}"?`)) return;
                const username = localStorage.getItem('sync_username') || 'Anonymous';

                fetch('../tools/api/tenant_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'remove_user',
                        tenant_id: this.selectedTenant.id,
                        username: targetUsername,
                        requester: username
                    })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        this.loadTenantUsers(this.selectedTenant.id);
                    } else {
                        alert('Error: ' + result.message);
                    }
                })
                .catch(err => { alert('Connection error'); console.error(err); });
            }

            resetForm() {
                document.getElementById('tenantForm').reset();
                document.getElementById('tenant-slug').value = '';
                this.editingId = null;
                document.getElementById('form-title').textContent = '➕ Create New Tenant';
                document.getElementById('submit-btn').innerHTML = '<span>🚀</span> Create Tenant';
                document.getElementById('cancel-btn').style.display = 'none';
            }

            cancelEdit() {
                this.resetForm();
            }

            showLoading(show) {
                document.getElementById('loading').style.display = show ? 'block' : 'none';
                document.getElementById('tenantsTable').style.display = show ? 'none' : 'table';
            }

            showMessage(text, type) {
                const div = document.getElementById('message');
                const cls = type === 'success' ? 'success-message' : 'error-message';
                div.innerHTML = `<div class="${cls}">${text}</div>`;
                setTimeout(() => { div.innerHTML = ''; }, 6000);
            }

            escHtml(text) {
                const d = document.createElement('div');
                d.textContent = text;
                return d.innerHTML;
            }
        }

        const tenantManager = new TenantManager();

        function closeUsersModal() {
            tenantManager.closeUsersModal();
        }
    </script>
</body>
</html>
