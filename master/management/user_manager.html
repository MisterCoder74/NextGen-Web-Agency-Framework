<body>
    <div class="noise"></div>

    <div class="page">
        <div class="page-header">
            <div class="icon-badge">👤</div>
            <div class="page-header-text">
                <h1>Vivacity <em>User Manager</em></h1>
                <p>Manage users for your workspace. Add technicians and administrators.</p>
            </div>
            <div class="header-meta" style="margin-left: auto; display: flex; align-items: center; gap: 12px;">
                <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
            </div>
        </div>

        <hr class="divider">

        <div class="scroll-area">
            <div class="card">
                <div class="section-title">➕ Add New User</div>
                <form id="addUserForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="user-username">Username *</label>
                            <input type="text" id="user-username" name="username" required placeholder="Enter username">
                        </div>
                        <div class="form-group">
                            <label for="user-password">Password *</label>
                            <input type="password" id="user-password" name="password" required placeholder="Enter password">
                        </div>
                        <div class="form-group">
                            <label for="user-role">Role</label>
                            <select id="user-role" name="role" style="width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:#fff; padding:10px 13px; font-size:0.86rem; outline:none;">
                                <option value="technician">Technician</option>
                                <option value="management">Management</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span>➕</span> Add User
                    </button>
                </form>
                <div id="message"></div>
            </div>

            <div class="section-title" style="margin-top: 30px;">👥 Workspace Users</div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <div id="loading" class="loading">
                    🔄 Loading users...
                </div>
                <table class="manager-table" id="usersTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Created</th>
                            <th>Created By</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        class UserManager {
            constructor() {
                this.users = [];
                this.init();
            }

            init() {
                document.getElementById('addUserForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleAddUser();
                });

                this.loadUsers();
            }

            handleAddUser() {
                const username = document.getElementById('user-username').value.trim();
                const password = document.getElementById('user-password').value.trim();
                const role = document.getElementById('user-role').value;

                if (!username || !password) {
                    this.showMessage('Username and password are required', 'error');
                    return;
                }

                const currentUser = localStorage.getItem('sync_username') || 'system';

                fetch('../tools/api/tenant_user_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'add',
                        username: username,
                        password: password,
                        role: role,
                        requester: currentUser
                    })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        this.showMessage('User added successfully! ✅', 'success');
                        document.getElementById('user-username').value = '';
                        document.getElementById('user-password').value = '';
                        this.loadUsers();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(err => {
                    this.showMessage('Connection error', 'error');
                    console.error(err);
                });
            }

            loadUsers() {
                this.showLoading(true);
                const currentUser = localStorage.getItem('sync_username') || 'Anonymous';

                fetch('../tools/api/tenant_user_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'list',
                        requester: currentUser
                    })
                })
                .then(r => r.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.users = result.data.users || [];
                        this.displayUsers(this.users);
                    } else {
                        this.showMessage('Error loading users: ' + result.message, 'error');
                    }
                })
                .catch(err => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error(err);
                });
            }

            displayUsers(users) {
                const tbody = document.getElementById('usersTableBody');
                const table = document.getElementById('usersTable');
                tbody.innerHTML = '';

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: rgba(255,255,255,0.3); padding: 40px;">No users yet. Create one above.</td></tr>';
                    table.style.display = 'table';
                    return;
                }

                const currentUsername = localStorage.getItem('sync_username') || '';

                users.forEach(u => {
                    const roleClass = u.role === 'management' ? 'role-mgmt' : 'role-tech';
                    const isSelf = u.username === currentUsername;
                    const createdDate = u.created_at ? u.created_at.split(' ')[0] : '-';

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>
                            <strong style="color: #5eead4;">${this.escHtml(u.username)}</strong>
                            ${isSelf ? '<span style="font-size: 0.65rem; color: rgba(255,255,255,0.4); margin-left: 8px;">(you)</span>' : ''}
                        </td>
                        <td><span class="role-badge ${roleClass}">${u.role}</span></td>
                        <td><span style="font-size: 0.75rem; color: rgba(255,255,255,0.4);">${createdDate}</span></td>
                        <td><span style="font-size: 0.75rem; color: rgba(255,255,255,0.4);">${this.escHtml(u.created_by || 'system')}</span></td>
                        <td class="actions-cell">
                            ${!isSelf ? `<button class="btn btn-small btn-delete-tool" onclick="userManager.removeUser('${this.escHtml(u.username)}')">✕ Remove</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                table.style.display = 'table';
            }

            removeUser(targetUsername) {
                if (!confirm('Remove user "' + targetUsername + '"? This cannot be undone.')) return;

                const currentUser = localStorage.getItem('sync_username') || 'Anonymous';

                fetch('../tools/api/tenant_user_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'remove',
                        username: targetUsername,
                        requester: currentUser
                    })
                })
                .then(r => r.json())
                .then(result => {
                    if (result.success) {
                        this.showMessage('User removed successfully! ✅', 'success');
                        this.loadUsers();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(err => {
                    this.showMessage('Connection error', 'error');
                    console.error(err);
                });
            }

            showLoading(show) {
                document.getElementById('loading').style.display = show ? 'block' : 'none';
                document.getElementById('usersTable').style.display = show ? 'none' : 'table';
            }

            showMessage(text, type) {
                const div = document.getElementById('message');
                const cls = type === 'success' ? 'success-message' : 'error-message';
                div.innerHTML = `<div class="${cls}">${text}</div>`;
                setTimeout(() => { div.innerHTML = ''; }, 6000);
            }

            escHtml(text) {
                const d = document.createElement('div');
                d.textContent = text;
                return d.innerHTML;
            }
        }

        const userManager = new UserManager();
    </script>
</body>
</html>
