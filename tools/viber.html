<script>
// === GESTIONE MODALE E LOCALSTORAGE ===
const setupBtn = document.getElementById('setupBtn');
const setupModal = document.getElementById('setupModal');
const cancelSetup = document.getElementById('cancelSetup');
const saveSetup = document.getElementById('saveSetup');
const apiKeyInput = document.getElementById('apiKey');
const modelSelect = document.getElementById('modelSelect');

setupBtn.onclick = () => {
// Carica eventuali valori salvati
const savedKey = localStorage.getItem('vivacity_apiKey');
const savedModel = localStorage.getItem('vivacity_model');
if (savedKey) apiKeyInput.value = savedKey;
if (savedModel) modelSelect.value = savedModel;
setupModal.style.display = 'flex';
};

cancelSetup.onclick = () => setupModal.style.display = 'none';
window.onclick = (e) => { if (e.target === setupModal) setupModal.style.display = 'none'; };

saveSetup.onclick = () => {
const apiKey = apiKeyInput.value.trim();
const model = modelSelect.value;
localStorage.setItem('vivacity_apiKey', apiKey);
localStorage.setItem('vivacity_model', model);
setupModal.style.display = 'none';
alert("Configurazione salvata!");
console.log("API Key salvata e modello selezionato:", model);
};
const autoExecuteChk = document.getElementById('autoExecuteChk');

setupBtn.onclick = () => {
const savedKey = localStorage.getItem('vivacity_apiKey');
const savedModel = localStorage.getItem('vivacity_model');
const savedAuto = localStorage.getItem('vivacity_autoExecute') === 'true';
if (savedKey) apiKeyInput.value = savedKey;
if (savedModel) modelSelect.value = savedModel;
autoExecuteChk.checked = savedAuto;
setupModal.style.display = 'flex';
};

saveSetup.onclick = () => {
const apiKey = apiKeyInput.value.trim();
const model = modelSelect.value;
const autoExec = autoExecuteChk.checked;
localStorage.setItem('vivacity_apiKey', apiKey);
localStorage.setItem('vivacity_model', model);
localStorage.setItem('vivacity_autoExecute', autoExec);
setupModal.style.display = 'none';
alert("Configurazione salvata!");
console.log("Setup salvato:", { model, autoExec });
};        
        
</script>
