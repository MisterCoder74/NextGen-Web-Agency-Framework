<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vivacity NextGen AI Image Rebuilder</title>
 <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
         
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/style.css">        
<style>
    .image-comparison-container {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }
    .image-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }
    .thumbnail-box {
        width: 100%;
        height: 350px;
        background: rgba(0,0,0,0.2);
        border: 2px dashed rgba(255,255,255,0.1);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }
    .thumbnail-box img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }
    #image-analysis-output {
        min-height: 80px;
        background: rgba(255,255,255,0.03);
        border-radius: 10px;
        padding: 12px;
        font-size: 0.9rem;
        line-height: 1.5;
        border: 1px solid rgba(255,255,255,0.1);
    }
    @media (max-width: 700px) {
        .image-comparison-container { flex-direction: column; }
        .thumbnail-box { height: 250px; }
    }
</style>
</head>
<body>

<div class="page">
    <div class="page-header">
        <div class="icon-badge">🖼️</div>
        <div class="page-header-text">
            <h1>Vivacity <em>NextGen Web Agency Image Rebuilder</em></h1>
            <p>Analyze an image and generate a high-quality variation using AI</p>
        </div>
    </div>

    <hr class="divider">

    <div class="scroll-area">
        <div class="image-comparison-container">
            <div class="image-panel">
                <div class="section-title">Original Image</div>
                <div class="thumbnail-box" id="original-box">
                    <span style="color: rgba(255,255,255,0.3);">No image uploaded</span>
                </div>
            </div>
            <div class="image-panel">
                <div class="section-title">AI Rebuilt Image</div>
                <div class="thumbnail-box" id="generated-box">
                    <span style="color: rgba(255,255,255,0.3);">Waiting for analysis...</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">📤 Upload & Analyze</div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                <input type="file" id="vfile-input" accept="image/*" style="display: none;">
                <button class="btn" onclick="document.getElementById('vfile-input').click()">📁 Select Image</button>
                <button class="btn btn-primary" id="btnAnalyze" disabled>🔍 Analyze Image</button>
                <span id="uploadStatus" style="font-size: 0.8rem; color: rgba(255,255,255,0.5);"></span>
            </div>
        </div>

        <div class="card">
            <div class="section-title">📝 Image Analysis</div>
            <div id="image-analysis-output" contenteditable="true">Analysis will appear here. You can edit it before rebuilding.</div>
            <button class="btn btn-primary" id="btnRebuild" style="margin-top: 12px;" disabled>🔁 Rebuild Image</button>
        </div>
    </div>
</div>

<script src="js/core.js"></script>
<script>
    let currentImageUrl = "";
    let analysisContent = "";

    document.getElementById('vfile-input').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            document.getElementById('original-box').innerHTML = `<img src="${url}" alt="Original">`;
            document.getElementById('btnAnalyze').disabled = false;
            document.getElementById('uploadStatus').textContent = file.name;
            
            // In a real app we'd upload to a server to get a public URL for GPT-4 Vision
            // Here we'll simulate the process or use base64 if allowed
            const reader = new FileReader();
            reader.onload = (evt) => {
                currentImageUrl = evt.target.result; // base64
            };
            reader.readAsDataURL(file);
        }
    };

    document.getElementById('btnAnalyze').onclick = async () => {
        const btn = document.getElementById('btnAnalyze');
        btn.disabled = true;
        btn.textContent = '⏳ Analyzing...';
        
        try {
            const messages = [
                { role: 'system', content: 'You are an AI image analyzer. Provide a detailed, descriptive prompt suitable for image generation based on the provided image.' },
                { role: 'user', content: [
                    { type: 'text', text: 'Provide a detailed description of the image content for rebuilding it. Focus on style, subjects, lighting, and composition. No intro/outro.' },
                    { type: 'image_url', image_url: { url: currentImageUrl } }
                ]}
            ];
            
            const data = await Core.callAI(messages, 'gpt-4o-mini');
            analysisContent = Core.cleanResponse(data.choices[0].message.content);
            document.getElementById('image-analysis-output').textContent = analysisContent;
            document.getElementById('btnRebuild').disabled = false;
        } catch (error) {
            alert('Analysis Error: ' + error.message);
        } finally {
            btn.disabled = false;
            btn.textContent = '🔍 Analyze Image';
        }
    };

    document.getElementById('btnRebuild').onclick = async () => {
        const btn = document.getElementById('btnRebuild');
        const prompt = document.getElementById('image-analysis-output').textContent.trim();
        if (!prompt) return;

        btn.disabled = true;
        btn.textContent = '⏳ Rebuilding...';
        document.getElementById('generated-box').innerHTML = '<div class="preloader active"></div>';

        try {
            // Direct DALL-E call as it's not handled by the chat proxy
            const apiKey = Core.getApiKey();
            const response = await fetch("https://api.openai.com/v1/images/generations", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + apiKey
                },
                body: JSON.stringify({
                    model: "dall-e-3",
                    prompt: prompt,
                    n: 1,
                    size: "1024x1024"
                })
            });

            if (!response.ok) throw new Error('Image generation failed');
            
            const data = await response.json();
            const url = data.data[0].url;
            
            document.getElementById('generated-box').innerHTML = `<img src="${url}" alt="Generated">`;
            
            const dlBtn = document.createElement('button');
            dlBtn.className = 'btn btn-success';
            dlBtn.style.marginTop = '10px';
            dlBtn.textContent = '⬇️ Download Image';
            dlBtn.onclick = () => window.open(url, '_blank');
            document.getElementById('generated-box').appendChild(dlBtn);

        } catch (error) {
            alert('Generation Error: ' + error.message);
            document.getElementById('generated-box').innerHTML = '<span style="color: #ff6b6b;">Error generating image</span>';
        } finally {
            btn.disabled = false;
            btn.textContent = '🔁 Rebuild Image';
        }
    };
</script>
</body>
</html>
