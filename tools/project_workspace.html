    <script src="../management/js/identity.js?v=<?php echo $version; ?>"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        function getDashboardUrl() {
            const role = localStorage.getItem('sync_role');
            const user = localStorage.getItem('sync_username');
            let dashUrl = role === 'management' ? '../management/dashboard.html' : 'dashboard.html';
            const params = new URLSearchParams();
            if (user) params.set('u', user);
            if (role) params.set('r', role);
            const paramsString = params.toString();
            return dashUrl + (paramsString ? '?' + paramsString : '');
        }

        if (!projectId) {
            alert('No project ID provided');
            window.location.href = getDashboardUrl();
        }

        // Update Back to Dashboard button
        document.addEventListener('DOMContentLoaded', () => {
            const backBtn = document.querySelector('.btn-back-dashboard');
            if (backBtn) {
                backBtn.href = getDashboardUrl();
            }
        });

        async function loadProjectInfo() {
            const username = localStorage.getItem('sync_username') || 'Anonymous';
            try {
                const response = await fetch('../management/project_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get', id: projectId, username: username })
                });
                const result = await response.json();
                if (result.success) {
                    renderBrief(result.data);
                    document.getElementById('project-title').innerHTML = `${result.data.nome_progetto} <em>Workspace</em>`;
                    setupClientView(result.data.cliente_id);
                } else {
                    document.getElementById('brief-content').innerHTML = `<p style="color:#ff6b6b;">${result.message}</p>`;
                }
            } catch (e) {
                console.error(e);
            }
        }

        function setupClientView(clientId) {
            const viewBtn = document.getElementById('view-client-btn');
            viewBtn.style.display = 'block';
            viewBtn.onclick = async () => {
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                try {
                    const response = await fetch('../management/client_handler.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'get', id: clientId, username: username })
                    });
                    const result = await response.json();
                    if (result.success) {
                        renderClientDetails(result.data);
                        document.getElementById('client-info-section').style.display = 'block';
                        viewBtn.style.display = 'none';
                    } else {
                        alert('Error loading client: ' + result.message);
                    }
                } catch (e) {
                    console.error(e);
                }
            };
        }

        function renderClientDetails(c) {
            const container = document.getElementById('client-details');
            container.innerHTML = `
                <div class="brief-item">
                    <div class="brief-label">Name</div>
                    <div class="brief-value">${c.nominativo}</div>
                </div>
                <div class="brief-item">
                    <div class="brief-label">Email</div>
                    <div class="brief-value">${c.email}</div>
                </div>
                <div class="brief-item">
                    <div class="brief-label">Address</div>
                    <div class="brief-value">${c.indirizzo || 'N/A'}</div>
                </div>
                <div class="brief-item">
                    <div class="brief-label">Notes</div>
                    <div class="brief-value">${c.note || 'No notes.'}</div>
                </div>
            `;
        }

        function renderBrief(p) {
            const container = document.getElementById('brief-content');
            container.innerHTML = `
                <div class="brief-item">
                    <div class="brief-label">Type</div>
                    <div class="brief-value">${p.tipologia}</div>
                </div>
                <div class="brief-item">
                    <div class="brief-label">Status</div>
                    <div class="brief-value"><span class="badge">${p.stato}</span></div>
                </div>
                <div class="brief-item">
                    <div class="brief-label">Priority</div>
                    <div class="brief-value" style="color: ${getPriorityColor(p.priorita)}">${p.priorita.toUpperCase()}</div>
                </div>
                <div class="brief-item">
                    <div class="brief-label">Description</div>
                    <div class="brief-value" style="white-space: pre-wrap;">${p.descrizione || 'No description provided.'}</div>
                </div>
                <div class="brief-item">
                    <div class="brief-label">Timeline</div>
                    <div class="brief-value">${p.data_inizio || 'N/A'} to ${p.data_fine || 'N/A'}</div>
                </div>
                <div class="brief-item">
                    <div class="brief-label">Budget</div>
                    <div class="brief-value">€ ${parseFloat(p.budget).toLocaleString()}</div>
                </div>
            `;
        }

        function getPriorityColor(pr) {
            return {
                'low': '#00f2a0',
                'medium': '#ffd700',
                'high': '#ff8c00',
                'urgent': '#ff4444'
            }[pr] || '#fff';
        }

        async function loadAssets() {
            try {
                const response = await fetch(`api/project_assets.php?action=list&id=${projectId}`);
                const result = await response.json();
                if (result.success) {
                    renderAssets(result.data);
                } else {
                    document.getElementById('asset-list').innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:#ff6b6b;">${result.message}</td></tr>`;
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderAssets(files) {
            const list = document.getElementById('asset-list');
            if (!files || files.length === 0) {
                list.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:rgba(255,255,255,0.3);">No assets uploaded yet.</td></tr>';
                return;
            }

            list.innerHTML = files.map(f => {
                const fileUrl = `../projects/${projectId}/${f.name}`;
                const downloadUrl = `api/project_assets.php?action=download&id=${projectId}&filename=${encodeURIComponent(f.name)}`;
                return `
                    <tr>
                        <td><span class="file-icon">📄</span> <strong>${f.name}</strong></td>
                        <td style="color:rgba(255,255,255,0.4);">${formatBytes(f.size)}</td>
                        <td style="color:rgba(255,255,255,0.4); font-size:0.75rem;">${f.date}</td>
                        <td class="actions-cell">
                            <div style="display: flex; gap: 5px; justify-content: flex-end;">
                                <a href="${fileUrl}" target="_blank" class="btn btn-secondary btn-small" style="text-decoration:none;">View</a>
                                <a href="${downloadUrl}" class="btn btn-primary btn-small" style="text-decoration:none;">Download</a>
                                <button class="btn btn-danger btn-small" onclick="deleteAsset('${f.name}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function deleteAsset(filename) {
            if (!confirm(`Are you sure you want to delete ${filename}?`)) return;
            try {
                const response = await fetch(`api/project_assets.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `action=delete&id=${projectId}&filename=${encodeURIComponent(filename)}`
                });
                const result = await response.json();
                if (result.success) {
                    loadAssets();
                } else {
                    alert(result.message);
                }
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (files.length === 0) return;

            const formData = new FormData();
            formData.append('action', 'upload');
            formData.append('id', projectId);
            
            for (let i = 0; i < files.length; i++) {
                formData.append('asset[]', files[i]);
            }

            try {
                const response = await fetch('api/project_assets.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    loadAssets();
                } else {
                    alert(result.message);
                }
            } catch (e) {
                console.error(e);
            }
        });

        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        loadProjectInfo();
        loadAssets();
    </script>
</body>
