<body>

<div class="page">

<textarea rows="4" id="prompt" placeholder="Describe the kind of landing page you want to generate" autocomplete="off" autofocus></textarea>
<button class="btn btn-primary" onclick="sendMessage()">Send</button>

<section id="content">
<div id="chathistory"></div>
</section>

<script>
/* ================== STYLE CONFIGURATION ================== */
const styleConfigs = {
professional: { verbosity: "low", spacing: "wide", cards_style: "rounded, shaded, bordered" },
minimal: { verbosity: "medium", spacing: "medium", cards_style: "shaded, bordered" },
hightech: { verbosity: "low", spacing: "narrow", cards_style: "rounded, shaded, bordered, glassmorphed" },
creative: { verbosity: "high", spacing: "wide", cards_style: "rounded, shaded, glassmorphed, gradiented" }
};

let selectedStyle = "";
let config = {};
let currentFrontendCode = "";
let currentBackendCode = "";        

/* ================== STYLE CONFIG FUNCTION ================== */
function getStyleConfig(style) {
return styleConfigs[style] || styleConfigs.professional;
}

/* ================== PATH CALCULATION ================== */
const origin = window.location.origin;
const pathname = window.location.pathname;
const folderPath = pathname.substring(0, pathname.lastIndexOf("/") + 1);
const urlWithoutFile = origin + folderPath;
console.log(urlWithoutFile);

/* ================== CHAT MEMORY INITIALIZATION ================== */
function createMemory(messages) {
return messages.map(msg => ({ role: msg.role, content: msg.content }));
}

let chatMemory = createMemory([
{
role: "system",
content: `You are a web designer and developer bot. Your output is made of code to satisfy the received request.
You will not greet or thank the user. Produce a website layout design as complete code with internal CSS and JS.

---- start of frontend section ----
(Complete HTML code including internal CSS and JavaScript)
---- end of frontend section ----

---- start of backend section ----
(Complete PHP code)
---- end of backend section ----

GENERAL CODE:
Never use markdown formatting.

IMAGES:
You have the following image definitions to work with:
${urlWithoutFile}placeholder_profile_woman.png,
${urlWithoutFile}placeholder_profile_man.png,
${urlWithoutFile}placeholder_team.png,
${urlWithoutFile}placeholder_horizontal.png,
${urlWithoutFile}placeholder_vertical.png,
${urlWithoutFile}placeholder_hero_image.png.

STYLE:
Follow the ${selectedStyle} style indicated by the user.
Text content verbosity ${config.verbosity}, cards ${config.cards_style}, spacing ${config.spacing}.

META TAGS, COLOR SCHEMA, and other constraints apply as described in the tool.
All backend contents and calls must be referenced to 'backend.php', for example form atchions, javascript fetches etc.
NEVER use markdown in your responses.`

}
]);

/* ================== UPDATE STYLE ================== */
function updateSystemPrompt() {
const systemIndex = chatMemory.findIndex(m => m.role === "system");
const updated = `You are a web designer and developer bot. Your output is made of code to satisfy the received request.
You will not greet or thank the user. Produce a website layout design as complete code with internal CSS and JS.

---- start of frontend section ----
(Complete HTML code including internal CSS and JavaScript)
---- end of frontend section ----

---- start of backend section ----
(Complete PHP code)
---- end of backend section ----

GENERAL CODE:
Never use markdown formatting or fencing.

IMAGES:
You have the following image definitions to work with:
${urlWithoutFile}placeholder_profile_woman.png,
${urlWithoutFile}placeholder_profile_man.png,
${urlWithoutFile}placeholder_team.png,
${urlWithoutFile}placeholder_horizontal.png,
${urlWithoutFile}placeholder_vertical.png,
${urlWithoutFile}placeholder_hero_image.png.

STYLE:
You will create the page strictly according to the ${selectedStyle} style.
Text content will have ${config.verbosity} verbosity; card will be ${config.cards_style}; spacing between elements ${config.spacing}. 
All backend contents and calls must be referenced to 'backend.php', for example form atchions, javascript fetches etc.
NEVER use markdown in your responses.`;

if (systemIndex !== -1) chatMemory[systemIndex].content = updated;
else chatMemory.unshift({ role: "system", content: updated });
}

/* ================== SAVE STYLE ================== */
function saveStyle() {
const radios = document.getElementsByName("style");
for (let i = 0; i < radios.length; i++) {
if (radios[i].checked) {
selectedStyle = radios[i].value;
config = getStyleConfig(selectedStyle);
console.log("Selected Style:", selectedStyle, config);
updateSystemPrompt();
}
}
}

/* ================== NAVBAR TOGGLE ================== */
function myFunction() {
const x = document.getElementById("myTopnav");
x.className = (x.className === "topnav") ? "topnav responsive" : "topnav";
}

/* ================== SAVE CHAT FILE ================== */
function saveChatContentTxt() {
const chatContent = document.getElementById("chathistory").innerText.replace(/Copy/g, "");
const datetime = new Date().toISOString();
const filename = "chatsession_v" + datetime.replace(/[-:.]/g, "");
const blob = new Blob([chatContent], { type: "text/plain" });
const url = URL.createObjectURL(blob);
const link = document.createElement("a");
link.href = url;
link.download = filename + ".txt";
link.click();
URL.revokeObjectURL(url);
}
const saveButtont = document.getElementById("savetxt");
if (saveButtont) saveButtont.addEventListener("click", saveChatContentTxt);

/* ================== SEND MESSAGE ================== */
async function sendMessage() {
saveStyle();

const inputElement = document.getElementById("prompt");
const userInput = inputElement.value.trim();
if (!userInput) return;

showMessage("Guest", userInput, "");

// Chiama l'API e aggiorna chatMemory
chatMemory = await getChatGPTResponse(userInput, chatMemory, selectedStyle);

inputElement.value = ""; // Pulisce il campo input
}


async function getChatGPTResponse(userInput, chatMemory = [], selectedStyle) {
const apikey = localStorage.getItem("openaikey");
if (!apikey) {
alert("No OpenAI API Key found.");
return chatMemory;
}
const chatContainer = document.getElementById("chathistory");
const typingIndicator = document.createElement("div");
typingIndicator.id = "typing-indicator";
typingIndicator.innerHTML = '<span class="dot"></span> Generating website…';
chatContainer.appendChild(typingIndicator);

try {
const requestBody = {
model: "gpt-5-chat-latest",
messages: [...chatMemory, { role: "user", content: userInput }]
};

const response = await fetch("https://api.openai.com/v1/chat/completions", {
method: "POST",
headers: {
"Content-Type": "application/json",
Authorization: "Bearer " + apikey
},
body: JSON.stringify(requestBody)
});

if (!response.ok) throw new Error("Error while requesting to the API");

const data = await response.json();

if (
!data.choices ||
!data.choices.length ||
!data.choices[0].message ||
!data.choices[0].message.content
) {
throw new Error("Invalid API response");
}

let chatGPTResponse = data.choices[0].message.content.trim();

// Rimuovi markdown e gestisci separazione frontend/backend
chatGPTResponse = chatGPTResponse.replace(/\*\*(.*?)\*\*/g, "$1");

chatGPTResponse = chatGPTResponse.replace(/---- start of frontend section ----/i, "<frontend>");
chatGPTResponse = chatGPTResponse.replace(/---- end of frontend section ----/i, "</frontend>");
chatGPTResponse = chatGPTResponse.replace(/---- start of backend section ----/i, "<backend>");
chatGPTResponse = chatGPTResponse.replace(/---- end of backend section ----/i, "</backend>");

const frontendMatch = chatGPTResponse.match(/<frontend>([\s\S]*?)<\/frontend>/i);
const backendMatch = chatGPTResponse.match(/<backend>([\s\S]*?)<\/backend>/i);

const frontendCode = frontendMatch ? frontendMatch[1].trim() : "";
const backendCode = backendMatch ? backendMatch[1].trim() : "";

// Salvo globalmente o gestisco come preferisci; ad esempio:
currentFrontendCode = frontendCode;
currentBackendCode = backendCode;

// Prepara link download
const frontendBlob = new Blob([frontendCode], { type: "text/html" });
const frontendUrl = URL.createObjectURL(frontendBlob);
const frontendDownloadLink = `<a href="${frontendUrl}" download="index.html" style="margin-right:10px;">Download Frontend (index.html)</a>`;

const backendBlob = new Blob([backendCode], { type: "application/php" });
const backendUrl = URL.createObjectURL(backendBlob);
const backendDownloadLink = `<a href="${backendUrl}" download="backend.php">Download Backend (backend.php)</a>`;

const downloadLinks = frontendDownloadLink + backendDownloadLink;

// Mostra anteprima frontend col codice e link download
showMessage("VivacityGPT", frontendCode, `Request: ${data.usage.prompt_tokens} tokens, Response: ${data.usage.completion_tokens} tokens`, downloadLinks);
        
// Aggiungi al DOM il pulsante deploy (esempio semplice)
const menubar = document.querySelector('.left-column');        
const deployBtn = document.createElement("button");
deployBtn.textContent = "Deploy on Vivacity Design";
deployBtn.style.margin = "10px";
deployBtn.className = "btn btn-primary";        
deployBtn.onclick = () => deployApp(frontendCode, backendCode);
menubar.appendChild(deployBtn);         

chatMemory.push({ role: "user", content: userInput });
chatMemory.push({ role: "assistant", content: chatGPTResponse });

return chatMemory;

} catch (err) {
console.error(err);
alert("An error occurred during the request. Check your OpenAI account or retry later.");
return chatMemory;
} finally {
if (typingIndicator.parentNode) typingIndicator.parentNode.removeChild(typingIndicator);
}
}



function showToast(message, url) {
const menubar = document.querySelector('.left-column');        
const toast = document.createElement("div");
toast.style.cssText = `
background: rgba(10, 10, 30, 0.85);
color: #fff;
padding: 14px 20px;
margin-top: 10px;
border-radius: 8px;
box-shadow: 0 0 12px #0ef;
display: flex;
justify-content: space-between;
align-items: center;
gap: 12px;
animation: fadein 0.5s, fadeout 0.5s 3.5s;
`;

const msgSpan = document.createElement("span");
msgSpan.textContent = message;

toast.appendChild(msgSpan);

if (url) {
const btn = document.createElement("button");
btn.textContent = "Apri App";
btn.style.cssText = `
background: #0ef;
color: #000;
border: none;
border-radius: 20px;
padding: 6px 14px;
font-weight: 600;
cursor: pointer;
transition: background 0.2s;
`;
btn.onclick = () => window.open(url, "_blank");
btn.onmouseenter = () => (btn.style.background = "#0cf");
btn.onmouseleave = () => (btn.style.background = "#0ef");
toast.appendChild(btn);
}

menubar.appendChild(toast);

setTimeout(() => {
toast.style.animation = "fadeout 0.5s forwards";
toast.addEventListener("animationend", () => toast.remove());
}, 10000);
}

async function deployApp(frontendCode,backendCode) {
if (!frontendCode || !backendCode) {
alert("Nessun codice da deployare. Genera prima il codice frontend e backend.");
return;
} else {
try {
const response = await fetch("deploy.php", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
frontend: currentFrontendCode,
backend: currentBackendCode
})
});

if (!response.ok) throw new Error("Errore nella richiesta di deploy.");

const data = await response.json();

if (data.success) {
showToast(`Deploy effettuato con successo!`, data.url);
} else {
showToast("Deploy fallito: " + (data.message || "Errore sconosciuto."));
}
} catch (err) {
console.error(err);
alert("Errore durante il deploy: " + err.message);
}
}
}        
      
        
       

/* ================== SHOW MESSAGE ================== */
function showMessage(sender, message, tokens, downloadLink) {
const chatContainer = document.getElementById("chathistory");
const typingIndicator = document.getElementById("typing-indicator");

if (typingIndicator && sender === "VivacityGPT")
chatContainer.removeChild(typingIndicator);

const messageElement = document.createElement("div");
const time = new Date();
const hour = time.getHours();
const minute = String(time.getMinutes()).padStart(2, "0");

if (sender === "Guest") {
messageElement.innerHTML = `[${hour}:${minute}] You: ${message}`;
messageElement.classList.add("user-message");
} else {
const timestamp = document.createElement("p");
timestamp.innerHTML = `[${hour}:${minute}] VivacityGPT:`;
timestamp.classList.add("chatgpt-message");
messageElement.appendChild(timestamp);

const contentEl = document.getElementById("content");
const panelH = Math.max(400, contentEl ? contentEl.clientHeight - 80 : 400);

const flex = document.createElement("div");
flex.style.cssText = "width:100%;display:flex;justify-content:space-between;";

const iframe = document.createElement("iframe");
iframe.style.cssText = "width:62%;height:800px;border:1px solid black;box-shadow:0px 4px 10px black;";
const blob = new Blob(
[`<!DOCTYPE html><html><body>${message}</body></html>`],
{ type: "text/html" });
iframe.src = URL.createObjectURL(blob);
flex.appendChild(iframe);

const codeDiv = document.createElement("div");
codeDiv.style.cssText = "width:36%;height:800px;overflow-y:auto;margin-left:10px;padding:4px 6px;border:1px solid black;box-shadow:0px 4px 10px black;font-size:.9rem;";
codeDiv.innerText = message;
flex.appendChild(codeDiv);

messageElement.appendChild(flex);

if (tokens) {
const sep = document.createElement("div");
sep.className = "token-info";
sep.innerHTML = tokens;
messageElement.appendChild(sep);
}

const dlink = document.createElement("div");
dlink.className = "dl-link";
dlink.innerHTML = downloadLink || "";
messageElement.appendChild(dlink);
}

chatContainer.appendChild(messageElement);
chatContainer.scrollTop = chatContainer.scrollHeight;
}

</script>
