<body>
    <div class="noise"></div>

    <div class="page">
        <div class="page-header">
            <div class="icon-badge">📊</div>
            <div class="page-header-text">
                <h1>Vivacity <em>NextGen Project Manager</em></h1>
                <p>Track and manage your agency projects, deadlines and budgets</p>
            </div>
            <div class="header-meta" style="margin-left: auto; display: flex; align-items: center; gap: 12px;">

                        <div class="form-group">

                        <div class="form-group">

    <script>
        class ProjectManager {
            constructor() {
                this.editingId = null;
                this.clients = [];
                this.technicians = [];
                this.init();
            }
            
            async init() {
                this.bindEvents();
                await this.loadClients();
                await this.loadTechnicians();
                await this.loadProjects();
                this.setDefaultDates();
            }
            
            bindEvents() {
                document.getElementById('projectForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleFormSubmit();
                });
                
                document.getElementById('cancel-btn').addEventListener('click', () => {
                    this.cancelEdit();
                });
            }
            
            setDefaultDates() {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('data_inizio').value = today;
                
                const nextMonth = new Date();
                nextMonth.setMonth(nextMonth.getMonth() + 1);
                document.getElementById('data_fine').value = nextMonth.toISOString().split('T')[0];
            }

            async loadTechnicians() {
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                try {
                    const response = await fetch('project_handler.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'list_technicians', username: username })
                    });
                    const result = await response.json();
                    if (result.success) {
                        this.technicians = result.data;
                        this.populateTechnicianSelect();
                    }
                } catch (error) {
                    console.error('Error loading technicians:', error);
                }
            }

            populateTechnicianSelect() {
                const select = document.getElementById('assigned_to');
                select.innerHTML = '<option value="">Not Assigned</option>';
                this.technicians.forEach(tech => {
                    const option = document.createElement('option');
                    option.value = tech.username;
                    option.textContent = tech.username;
                    select.appendChild(option);
                });
            }
            
            loadClients() {
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                return fetch('client_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'list',
                        username: username
                    })
                })
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        this.clients = result.data;
                        this.populateClientSelect();
                    } else {
                        this.showMessage('Error loading clients: ' + result.message, 'error');
                    }
                })
                .catch(error => {
                    this.showMessage('Connection error to clients', 'error');
                    console.error('Error:', error);
                });
            }
            
            populateClientSelect() {
                const select = document.getElementById('cliente_id');
                select.innerHTML = '<option value="">Select client</option>';
                
                this.clients.forEach(client => {
                    const option = document.createElement('option');
                    option.value = client.id;
                    option.textContent = `${client.nominativo} (${client.email})`;
                    select.appendChild(option);
                });
            }
            
            handleFormSubmit() {
                const formData = this.getFormData();
                
                if (!this.validateForm(formData)) {
                    return;
                }
                
                if (this.editingId) {
                    this.updateProject(formData);
                } else {
                    this.addProject(formData);
                }
            }
            
            getFormData() {
                return {
                    nome_progetto: document.getElementById('nome_progetto').value.trim(),
                    tipologia: document.getElementById('tipologia').value,
                    cliente_id: document.getElementById('cliente_id').value,
                    stato: document.getElementById('stato').value,
                    data_inizio: document.getElementById('data_inizio').value,
                    data_fine: document.getElementById('data_fine').value,
                    budget: parseFloat(document.getElementById('budget').value) || 0,
                    priorita: document.getElementById('priorita').value,
                    assigned_to: document.getElementById('assigned_to').value,
                    descrizione: document.getElementById('descrizione').value.trim()
                };
            }
            
            validateForm(data) {
                if (!data.nome_progetto) {
                    this.showMessage('Project name is required', 'error');
                    return false;
                }
                
                if (!data.tipologia) {
                    this.showMessage('Type is required', 'error');
                    return false;
                }
                
                if (!data.cliente_id) {
                    this.showMessage('Select a client', 'error');
                    return false;
                }
                
                if (data.data_inizio && data.data_fine && data.data_inizio > data.data_fine) {
                    this.showMessage('End date cannot be earlier than start date', 'error');
                    return false;
                }
                
                return true;
            }
            
            addProject(data) {
                this.showLoading(true);
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                
                fetch('project_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'add',
                        data: data,
                        username: username
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.showMessage('Project added successfully! ✅', 'success');
                        this.resetForm();
                        this.loadProjects();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            updateProject(data) {
                this.showLoading(true);
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                
                fetch('project_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'update',
                        id: this.editingId,
                        data: data,
                        username: username
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.showMessage('Project updated successfully! ✅', 'success');
                        this.cancelEdit();
                        this.loadProjects();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            deleteProject(id) {
                if (!confirm('Are you sure you want to delete this project?')) {
                    return;
                }
                
                this.showLoading(true);
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                
                fetch('project_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'delete',
                        id: id,
                        username: username
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.showMessage('Project deleted successfully! ✅', 'success');
                        this.loadProjects();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            loadProjects() {
                this.showLoading(true);
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                
                return fetch('project_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'list',
                        username: username
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.displayProjects(result.data);
                    } else {
                        this.showMessage('Error loading: ' + result.message, 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            displayProjects(projects) {
                const tbody = document.getElementById('projectsTableBody');
                const table = document.getElementById('projectsTable');
                
                tbody.innerHTML = '';
                
                if (projects.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; color: rgba(255,255,255,0.3); padding: 40px;">No projects found in database</td></tr>';
                } else {
                    projects.forEach(project => {
                        const client = this.clients.find(c => c.id === project.cliente_id);
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><strong style="color: #fff;">${this.escapeHtml(project.nome_progetto)}</strong></td>
                            <td>
                                <div class="client-info">
                                    <span class="client-name">${client ? this.escapeHtml(client.nominativo) : 'Client not found'}</span>
                                    <span class="client-email">${client ? this.escapeHtml(client.email) : ''}</span>
                                </div>
                            </td>
                            <td><span style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">${this.escapeHtml(project.tipologia)}</span></td>
                            <td><span class="status-badge status-${project.stato}">${this.capitalizeFirst(project.stato)}</span></td>
                            <td><span style="font-size: 0.8rem; color: rgba(255,255,255,0.6);">${this.capitalizeFirst(project.priorita)}</span></td>
                            <td><span style="font-size: 0.8rem; color: var(--cyan);">${project.assigned_to ? this.escapeHtml(project.assigned_to) : '<em style="opacity:0.5;">Unassigned</em>'}</span></td>
                            <td><strong style="color: var(--cyan);">${project.budget > 0 ? '€' + project.budget.toLocaleString('en-US', {minimumFractionDigits: 2}) : '-'}</strong></td>
                            <td>
                                <div style="font-size: 0.7rem; color: rgba(255,255,255,0.4); font-family: var(--font-mono);">
                                    ${project.data_inizio ? 'S: ' + this.formatDate(project.data_inizio) : ''}<br>
                                    ${project.data_fine ? 'E: ' + this.formatDate(project.data_fine) : ''}
                                </div>
                            </td>
                            <td>
                                <a href="../tools/project_workspace.html?id=${project.id}" class="btn btn-small btn-edit-tool" style="display: inline-flex; align-items: center; text-decoration: none; gap: 5px;">
                                    <span>📂</span> Open
                                </a>
                            </td>
                            <td class="actions-cell">
                                <button class="btn btn-small btn-edit-tool" onclick="projectManager.editProject('${project.id}')">
                                    Edit
                                </button>
                                <button class="btn btn-small btn-delete-tool" onclick="projectManager.deleteProject('${project.id}')">
                                    Delete
                                </button>
                            </td>
                            `;
                        tbody.appendChild(row);
                    });
                }
                
                table.style.display = 'table';
            }
            
            editProject(id) {
                this.showLoading(true);
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                
                fetch('project_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'get',
                        id: id,
                        username: username
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success && result.data) {
                        this.populateForm(result.data);
                        this.editingId = id;
                        this.setEditMode(true);
                        document.getElementById('nome_progetto').focus();
                    } else {
                        this.showMessage('Project not found', 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            populateForm(project) {
                document.getElementById('nome_progetto').value = project.nome_progetto || '';
                document.getElementById('tipologia').value = project.tipologia || '';
                document.getElementById('cliente_id').value = project.cliente_id || '';
                document.getElementById('stato').value = project.stato || 'active';
                document.getElementById('data_inizio').value = project.data_inizio || '';
                document.getElementById('data_fine').value = project.data_fine || '';
                document.getElementById('budget').value = project.budget || '';
                document.getElementById('priorita').value = project.priorita || 'medium';
                document.getElementById('assigned_to').value = project.assigned_to || '';
                document.getElementById('descrizione').value = project.descrizione || '';
            }
            
            setEditMode(editing) {
                const title = document.getElementById('form-title');
                const submitBtn = document.getElementById('submit-btn');
                const cancelBtn = document.getElementById('cancel-btn');
                
                if (editing) {
                    title.textContent = '✏️ Edit Project';
                    submitBtn.innerHTML = '<span>💾</span> Save Changes';
                    cancelBtn.style.display = 'inline-flex';
                } else {
                    title.textContent = '➕ Add New Project';
                    submitBtn.innerHTML = '<span>💾</span> Save Project';
                    cancelBtn.style.display = 'none';
                }
            }
            
            cancelEdit() {
                this.editingId = null;
                this.setEditMode(false);
                this.resetForm();
            }
            
            resetForm() {
                document.getElementById('projectForm').reset();
                this.setDefaultDates();
                document.getElementById('stato').value = 'active';
                document.getElementById('priorita').value = 'medium';
                document.getElementById('assigned_to').value = '';
            }
            
            showLoading(show) {
                document.getElementById('loading').style.display = show ? 'block' : 'none';
                document.getElementById('projectsTable').style.display = show ? 'none' : 'table';
            }
            
            showMessage(text, type) {
                const messageDiv = document.getElementById('message');
                const className = type === 'success' ? 'success-message' : 'error-message';
                messageDiv.innerHTML = `<div class="${className}" style="margin-top: 15px;">${text}</div>`;
                
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 5000);
            }
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            capitalizeFirst(str) {
                if (!str) return '';
                return str.charAt(0).toUpperCase() + str.slice(1);
            }
            
            formatDate(dateString) {
                if (!dateString) return '';
                const date = new Date(dateString);
                return date.toLocaleDateString('en-US');
            }
        }
        
        // Initialize app
        const projectManager = new ProjectManager();
    </script>
