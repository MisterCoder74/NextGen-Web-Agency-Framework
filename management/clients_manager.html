<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivacity NextGen Client Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .manager-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .manager-table th {
            text-align: left;
            background: rgba(255,255,255,0.03);
            padding: 12px 15px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .manager-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .manager-table tr:last-child td {
            border-bottom: none;
        }
        .actions-cell {
            text-align: right;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .btn-small {
            padding: 5px 10px;
            font-size: 0.75rem;
            border-radius: 6px;
        }
        .btn-edit-tool {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .btn-edit-tool:hover {
            background: #10b981;
            color: #fff;
        }
        .btn-delete-tool {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }
        .btn-delete-tool:hover {
            background: #ff6b6b;
            color: #fff;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
        }
        input[type="text"], input[type="email"], textarea {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            padding: 10px 13px;
            font-size: 0.86rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            border-color: var(--cyan);
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--cyan);
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <div class="page">
        <div class="page-header">
            <div class="icon-badge">👥</div>
            <div class="page-header-text">
                <h1>Vivacity <em>NextGen Client Manager</em></h1>
                <p>Manage your client database for projects and quotes</p>
            </div>
            <div class="header-meta" style="margin-left: auto; display: flex; align-items: center; gap: 12px;">
                <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
            </div>
        </div>

        <hr class="divider">

        <div class="scroll-area">
            <div class="card">
                <div class="section-title" id="form-title">➕ Add New Client</div>
                <form id="clientForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="nominativo">Name *</label>
                            <input type="text" id="nominativo" name="nominativo" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group full-width">
                            <label for="indirizzo">Address</label>
                            <input type="text" id="indirizzo" name="indirizzo">
                        </div>
                        
                        <div class="form-group full-width">
                            <label for="note">Notes</label>
                            <textarea id="note" name="note" placeholder="Add any notes about the client..."></textarea>
                        </div>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary" id="submit-btn">
                            <span>💾</span> Save Client
                        </button>
                        <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">
                            <span>✕</span> Cancel
                        </button>
                    </div>
                </form>
                <div id="message"></div>
            </div>

            <div class="section-title" style="margin-top: 20px;">📋 Client List</div>
            <div class="card" style="padding: 0; overflow: hidden;">
                <div id="loading" class="loading" style="display: none;">
                    🔄 Syncing with database...
                </div>
                <table class="manager-table" id="clientsTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Notes</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="clientsTableBody">
                        <!-- Data will be inserted dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        class ClientManager {
            constructor() {
                this.editingId = null;
                this.init();
            }
            
            init() {
                this.bindEvents();
                this.loadClients();
            }
            
            bindEvents() {
                document.getElementById('clientForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleFormSubmit();
                });
                
                document.getElementById('cancel-btn').addEventListener('click', () => {
                    this.cancelEdit();
                });
            }
            
            handleFormSubmit() {
                const formData = this.getFormData();
                
                if (!this.validateForm(formData)) {
                    return;
                }
                
                if (this.editingId) {
                    this.updateClient(formData);
                } else {
                    this.addClient(formData);
                }
            }
            
            getFormData() {
                return {
                    nominativo: document.getElementById('nominativo').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    indirizzo: document.getElementById('indirizzo').value.trim(),
                    note: document.getElementById('note').value.trim()
                };
            }
            
            validateForm(data) {
                if (!data.nominativo) {
                    this.showMessage('Name is required', 'error');
                    return false;
                }
                
                if (!data.email || !this.isValidEmail(data.email)) {
                    this.showMessage('Enter a valid email', 'error');
                    return false;
                }
                
                return true;
            }
            
            isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }
            
            addClient(data) {
                this.showLoading(true);
                
                fetch('client_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'add',
                        data: data
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.showMessage('Client added successfully! ✅', 'success');
                        this.resetForm();
                        this.loadClients();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            updateClient(data) {
                this.showLoading(true);
                
                fetch('client_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'update',
                        id: this.editingId,
                        data: data
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.showMessage('Client updated successfully! ✅', 'success');
                        this.cancelEdit();
                        this.loadClients();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            deleteClient(id) {
                if (!confirm('Are you sure you want to delete this client?')) {
                    return;
                }
                
                this.showLoading(true);
                
                fetch('client_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'delete',
                        id: id
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.showMessage('Client deleted successfully! ✅', 'success');
                        this.loadClients();
                    } else {
                        this.showMessage('Error: ' + result.message, 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            loadClients() {
                this.showLoading(true);
                
                fetch('client_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'list'
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success) {
                        this.displayClients(result.data);
                    } else {
                        this.showMessage('Error loading: ' + result.message, 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            displayClients(clients) {
                const tbody = document.getElementById('clientsTableBody');
                const table = document.getElementById('clientsTable');
                
                tbody.innerHTML = '';
                
                if (clients.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: rgba(255,255,255,0.3); padding: 40px;">No clients found in database</td></tr>';
                } else {
                    clients.forEach(client => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td><strong>${this.escapeHtml(client.nominativo)}</strong></td>
                            <td><span style="color: rgba(255,255,255,0.6);">${this.escapeHtml(client.email)}</span></td>
                            <td><span style="font-size: 0.8rem; color: rgba(255,255,255,0.4);">${this.escapeHtml(client.indirizzo || '-')}</span></td>
                            <td><span style="font-size: 0.8rem; color: rgba(255,255,255,0.4);">${this.escapeHtml(client.note || '-')}</span></td>
                            <td class="actions-cell">
                                <button class="btn btn-small btn-edit-tool" onclick="clientManager.editClient('${client.id}')">
                                    Edit
                                </button>
                                <button class="btn btn-small btn-delete-tool" onclick="clientManager.deleteClient('${client.id}')">
                                    Delete
                                </button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                }
                
                table.style.display = 'table';
            }
            
            editClient(id) {
                this.showLoading(true);
                
                fetch('client_handler.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'get',
                        id: id
                    })
                })
                .then(response => response.json())
                .then(result => {
                    this.showLoading(false);
                    if (result.success && result.data) {
                        this.populateForm(result.data);
                        this.editingId = id;
                        this.setEditMode(true);
                        document.getElementById('nominativo').focus();
                    } else {
                        this.showMessage('Client not found', 'error');
                    }
                })
                .catch(error => {
                    this.showLoading(false);
                    this.showMessage('Connection error', 'error');
                    console.error('Error:', error);
                });
            }
            
            populateForm(client) {
                document.getElementById('nominativo').value = client.nominativo || '';
                document.getElementById('email').value = client.email || '';
                document.getElementById('indirizzo').value = client.indirizzo || '';
                document.getElementById('note').value = client.note || '';
            }
            
            setEditMode(editing) {
                const title = document.getElementById('form-title');
                const submitBtn = document.getElementById('submit-btn');
                const cancelBtn = document.getElementById('cancel-btn');
                
                if (editing) {
                    title.textContent = '✏️ Edit Client';
                    submitBtn.innerHTML = '<span>💾</span> Save Changes';
                    cancelBtn.style.display = 'inline-flex';
                } else {
                    title.textContent = '➕ Add New Client';
                    submitBtn.innerHTML = '<span>💾</span> Save Client';
                    cancelBtn.style.display = 'none';
                }
            }
            
            cancelEdit() {
                this.editingId = null;
                this.setEditMode(false);
                this.resetForm();
            }
            
            resetForm() {
                document.getElementById('clientForm').reset();
            }
            
            showLoading(show) {
                document.getElementById('loading').style.display = show ? 'block' : 'none';
                document.getElementById('clientsTable').style.display = show ? 'none' : 'table';
            }
            
            showMessage(text, type) {
                const messageDiv = document.getElementById('message');
                const className = type === 'success' ? 'success-message' : 'error-message';
                messageDiv.innerHTML = `<div class="${className}" style="margin-top: 15px;">${text}</div>`;
                
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 5000);
            }
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }
        
        // Initialize app
        const clientManager = new ClientManager();
    </script>
</body>
</html>
