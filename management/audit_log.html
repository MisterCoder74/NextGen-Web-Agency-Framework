<body>
    <div class="noise"></div>
    <div class="page">
        <div class="page-header">
            <div class="icon-badge">📋</div>
            <div class="page-header-text">
                <h1>System <em>Audit Log</em></h1>
                <p>Track all critical system actions and backups</p>
            </div>
            <div style="margin-left: auto;">
                <a href="dashboard.html" class="btn">← Back to Dashboard</a>
            </div>
        </div>

        <hr class="divider">

        <div class="scroll-area">
            <div class="card">
                <div class="section-title">Log Entries</div>
                <div id="logContainer">
                    <table class="audit-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Action</th>
                                <th>User</th>
                                <th>IP Address</th>
                                <th>User Agent</th>
                            </tr>
                        </thead>
                        <tbody id="logBody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 40px; opacity: 0.5;">Loading logs...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadLogs() {
            try {
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                const response = await fetch(`../audit_log.json?u=${encodeURIComponent(username)}`);
                if (!response.ok) throw new Error('Could not load logs');
                const logs = await response.json();
                
                const logBody = document.getElementById('logBody');
                if (!logs || logs.length === 0) {
                    logBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; opacity: 0.5;">No log entries found.</td></tr>';
                    return;
                }

                // Sort newest first
                logs.reverse();

                logBody.innerHTML = logs.map(log => `
                    <tr>
                        <td class="timestamp">${log.timestamp}</td>
                        <td class="action">${log.action}</td>
                        <td class="user" style="color: #fcd34d; font-weight: 500;">${log.user || 'Anonymous'}</td>
                        <td class="ip">${log.ip}</td>
                        <td style="font-size: 0.7rem; opacity: 0.6; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${log.user_agent}">
                            ${log.user_agent}
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                document.getElementById('logBody').innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 40px; color: #ff6b6b;">${error.message}</td></tr>`;
            }
        }

        document.addEventListener('DOMContentLoaded', loadLogs);
    </script>
</body>
</html>
