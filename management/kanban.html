<body>
    <div class="noise"></div>

    <div class="page">
        <div class="page-header">
            <div class="icon-badge">📋</div>
            <div class="page-header-text">
                <h1>Vivacity <em>NextGen Kanban Board</em></h1>
                <p>Strategic Task Management — Workflow Orchestration</p>
            </div>
            <div style="margin-left: auto;">
                <a href="dashboard.html" style="color: #5eead4; text-decoration: none; font-size: 0.8rem; font-weight: 600;">← Back to Dashboard</a>
            </div>
        </div>

        <hr class="divider">

        <div class="scroll-area">
            <div class="kanban-container">
                <div class="kanban-column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
                    <div class="column-header">
                        <span class="column-title">To Do</span>
                        <span class="badge" id="todo-count">0</span>
                    </div>
                    <div class="task-list" id="todo-list"></div>
                    <button class="add-task-btn" onclick="openModal('todo')">+ Add Task</button>
                </div>

                <div class="kanban-column" id="doing" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
                    <div class="column-header">
                        <span class="column-title">Doing</span>
                        <span class="badge" id="doing-count">0</span>
                    </div>
                    <div class="task-list" id="doing-list"></div>
                    <button class="add-task-btn" onclick="openModal('doing')">+ Add Task</button>
                </div>

                <div class="kanban-column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
                    <div class="column-header">
                        <span class="column-title">Done</span>
                        <span class="badge" id="done-count">0</span>
                    </div>
                    <div class="task-list" id="done-list"></div>
                    <button class="add-task-btn" onclick="openModal('done')">+ Add Task</button>
                </div>

                <div class="kanban-column" id="on-hold" ondrop="drop(event)" ondragover="allowDrop(event)" ondragenter="dragEnter(event)" ondragleave="dragLeave(event)">
                    <div class="column-header">
                        <span class="column-title">On Hold</span>
                        <span class="badge" id="on-hold-count">0</span>
                    </div>
                    <div class="task-list" id="on-hold-list"></div>
                    <button class="add-task-btn" onclick="openModal('on-hold')">+ Add Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
            </div>
            <div class="form-group">
                <label>Task Description</label>
                <textarea id="taskText" rows="3" placeholder="What needs to be done?"></textarea>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                    <option value="Urgent">Urgent</option>
                </select>
            </div>
            <input type="hidden" id="taskColumn">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let currentEditingColumn = '';

        async function loadTasks() {
            try {
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                const response = await fetch(`kanban_handler.php?u=${encodeURIComponent(username)}`);
                tasks = await response.json();
                renderBoard();
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }

        async function saveTasks() {
            try {
                const username = localStorage.getItem('sync_username') || 'Anonymous';
                await fetch('kanban_handler.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tasks: tasks,
                        username: username
                    })
                });
            } catch (error) {
                console.error('Error saving tasks:', error);
            }
        }

        function renderBoard() {
            const columns = ['todo', 'doing', 'done', 'on-hold'];
            columns.forEach(col => {
                const list = document.getElementById(`${col}-list`);
                const countBadge = document.getElementById(`${col}-count`);
                const columnTasks = tasks.filter(t => t.column === col);
                
                list.innerHTML = '';
                countBadge.textContent = columnTasks.length;

                columnTasks.forEach(task => {
                    const card = document.createElement('div');
                    card.className = 'task-card';
                    card.draggable = true;
                    card.id = `task-${task.id}`;
                    card.ondragstart = drag;
                    
                    const priorityClass = `priority-${task.priority.toLowerCase()}`;
                    
                    card.innerHTML = `
                        <div class="task-text">${task.text}</div>
                        <div class="task-meta">
                            <span class="task-time">${task.timestamp}</span>
                            <span class="priority-badge ${priorityClass}">${task.priority}</span>
                        </div>
                        <div style="margin-top:10px; display:flex; justify-content:flex-end;">
                            <button onclick="deleteTask('${task.id}')" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:0.7rem; opacity:0.6;">Delete</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        }

        function openModal(column) {
            currentEditingColumn = column;
            document.getElementById('taskColumn').value = column;
            document.getElementById('taskModal').style.display = 'flex';
            document.getElementById('taskText').focus();
        }

        function closeModal() {
            document.getElementById('taskModal').style.display = 'none';
            document.getElementById('taskText').value = '';
        }

        function saveTask() {
            const text = document.getElementById('taskText').value.trim();
            const priority = document.getElementById('taskPriority').value;
            const column = document.getElementById('taskColumn').value;

            if (!text) return;

            const newTask = {
                id: Date.now().toString(),
                text: text,
                priority: priority,
                column: column,
                timestamp: new Date().toLocaleString()
            };

            tasks.push(newTask);
            saveTasks();
            renderBoard();
            closeModal();
        }

        function deleteTask(id) {
            if (confirm('Delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderBoard();
            }
        }

        // Drag & Drop Functions
        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
        }

        function dragEnter(ev) {
            const column = ev.target.closest('.kanban-column');
            if (column) column.classList.add('drag-over');
        }

        function dragLeave(ev) {
            const column = ev.target.closest('.kanban-column');
            if (column) column.classList.remove('drag-over');
        }

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const taskId = data.replace('task-', '');
            const targetColumn = ev.target.closest('.kanban-column');
            
            if (targetColumn) {
                targetColumn.classList.remove('drag-over');
                const newColumnId = targetColumn.id;
                
                const taskIndex = tasks.findIndex(t => t.id === taskId);
                if (taskIndex !== -1 && tasks[taskIndex].column !== newColumnId) {
                    tasks[taskIndex].column = newColumnId;
                    saveTasks();
                    renderBoard();
                }
            }
        }

        // Initialize
        loadTasks();

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('taskModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
