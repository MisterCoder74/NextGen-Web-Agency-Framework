<body>

    <div class="page">

        <div class="scroll-area">

                        <div id="noDataStatus" class="no-data" style="display: none;">Insufficient data</div>
                    </div>
                </div>

                <div class="chart-container">
                    <h2>Technician Workload</h2>
                    <div class="chart-wrapper">
                        <canvas id="workloadChart"></canvas>
                        <div id="noDataWorkload" class="no-data" style="display: none;">Insufficient data</div>
                    </div>
                </div>

                <div class="chart-container">
                    <h2>Project Priorities</h2>
                    <div class="chart-wrapper">
                        <canvas id="priorityChart"></canvas>
                        <div id="noDataPriority" class="no-data" style="display: none;">Insufficient data</div>
                    </div>
                </div>

                <div class="chart-container">
                    <h2>Micro-app Distribution</h2>
                    <div class="chart-wrapper">
                        <canvas id="microappChart"></canvas>
                        <div id="noDataMicroapp" class="no-data" style="display: none;">Insufficient data</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set default Chart.js options for dark theme
        Chart.defaults.color = 'rgba(255, 255, 255, 0.7)';
        Chart.defaults.font.family = "'JetBrains Mono', monospace";
        Chart.defaults.borderColor = 'rgba(255, 255, 255, 0.1)';

        const colors = {
            cyan: '#00d4ff',
            amber: '#f59e0b',
            green: '#10b981',
            red: '#ef4444',
            purple: '#a78bfa',
            blue: '#3b82f6',
            gray: '#64748b'
        };

        const priorityWeights = {
            'urgent': 4,
            'high': 3,
            'medium': 2,
            'low': 1
        };

        async function loadData() {
            const t = Date.now();
            const username = localStorage.getItem('sync_username') || 'Anonymous';
            
            try {
                const [projectsRes, techniciansRes, microappsRes] = await Promise.all([
                    fetch(`projects.json?t=${t}`).then(r => r.json()).catch(() => []),
                    fetch('project_handler.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'list_technicians', username })
                    }).then(r => r.json()).catch(() => ({ success: false })),
                    fetch(`../tools/api/microapps.json?t=${t}`).then(r => r.json()).catch(() => [])
                ]);

                const projects = Array.isArray(projectsRes) ? projectsRes : [];
                const technicians = techniciansRes.success ? techniciansRes.data : [];
                const microapps = Array.isArray(microappsRes) ? microappsRes : [];

                renderStatusChart(projects);
                renderWorkloadChart(projects, technicians);
                renderPriorityChart(projects);
                renderMicroappChart(projects, microapps);

            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function renderStatusChart(projects) {
            const ctx = document.getElementById('statusChart');
            const counts = {
                active: 0,
                completed: 0,
                suspended: 0,
                cancelled: 0
            };

            projects.forEach(p => {
                if (counts.hasOwnProperty(p.stato)) {
                    counts[p.stato]++;
                }
            });

            const data = Object.values(counts);
            if (data.every(v => v === 0)) {
                document.getElementById('noDataStatus').style.display = 'block';
                return;
            }

            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Completed', 'Suspended', 'Cancelled'],
                    datasets: [{
                        data: data,
                        backgroundColor: [colors.cyan, colors.green, colors.amber, colors.red],
                        borderWidth: 0,
                        hoverOffset: 15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    layout: {
                        padding: 10
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                usePointStyle: true,
                                font: {
                                    size: 11
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderWorkloadChart(projects, technicians) {
            const ctx = document.getElementById('workloadChart');
            const workload = {};

            technicians.forEach(t => workload[t.username] = 0);
            workload['Unassigned'] = 0;

            projects.forEach(p => {
                if (p.stato === 'completed' || p.stato === 'cancelled') return;
                const assigned = p.assigned_to || 'Unassigned';
                const weight = priorityWeights[p.priorita] || 2;
                if (!workload.hasOwnProperty(assigned)) workload[assigned] = 0;
                workload[assigned] += weight;
            });

            const labels = Object.keys(workload).filter(k => workload[k] > 0 || k !== 'Unassigned');
            const data = labels.map(l => workload[l]);

            if (data.every(v => v === 0)) {
                document.getElementById('noDataWorkload').style.display = 'block';
                return;
            }

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Workload Score',
                        data: data,
                        backgroundColor: colors.cyan,
                        borderRadius: 6,
                        barPercentage: 0.6,
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function renderPriorityChart(projects) {
            const ctx = document.getElementById('priorityChart');
            const counts = {
                urgent: 0,
                high: 0,
                medium: 0,
                low: 0
            };

            projects.forEach(p => {
                if (counts.hasOwnProperty(p.priorita)) {
                    counts[p.priorita]++;
                }
            });

            const labels = ['Urgent', 'High', 'Medium', 'Low'];
            const data = [counts.urgent, counts.high, counts.medium, counts.low];

            if (data.every(v => v === 0)) {
                document.getElementById('noDataPriority').style.display = 'block';
                return;
            }

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: [colors.red, colors.amber, colors.cyan, colors.gray],
                        borderRadius: 6,
                        barPercentage: 0.6,
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { stepSize: 1 }
                        },
                        y: {
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        function renderMicroappChart(projects, microapps) {
            const ctx = document.getElementById('microappChart');
            const counts = {};

            projects.forEach(p => {
                counts[p.nome_progetto] = 0;
            });

            microapps.forEach(m => {
                if (m.project_id) {
                    const project = projects.find(p => p.id === m.project_id);
                    if (project) {
                        counts[project.nome_progetto]++;
                    }
                }
            });

            // Filter projects that have at least one micro-app or just show top 5 projects
            const labels = Object.keys(counts).filter(k => counts[k] > 0).slice(0, 10);
            const data = labels.map(l => counts[l]);

            if (data.length === 0) {
                document.getElementById('noDataMicroapp').style.display = 'block';
                return;
            }

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Micro-apps',
                        data: data,
                        backgroundColor: colors.purple,
                        borderRadius: 6,
                        barPercentage: 0.6,
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { stepSize: 1 }
                        },
                        x: {
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
